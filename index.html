<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas & Brunna - Apresentação de Casamento</title>
    <!-- Google Fonts: Playfair Display (Serif romântica) e Montserrat (Sans-serif moderna) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Alex+Brush&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Tela Inicial de Boas-Vindas / Ativação (Necessária para Autoplay e Tela Cheia) -->
    <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-card">
            <div class="wedding-rings">
                <svg viewBox="0 0 100 60" width="80" height="48" fill="none" stroke="currentColor">
                    <circle cx="35" cy="30" r="22" stroke-width="2"/>
                    <circle cx="65" cy="30" r="22" stroke-width="2"/>
                    <path d="M 46 20 C 50 15, 50 15, 54 20" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>Lucas & Brunna</h1>
            <p class="subtitle">Nossa História em Fotos</p>
            <div class="divider"></div>
            <p class="instruction">Selecione uma música de fundo (opcional) e clique para iniciar a apresentação.</p>
            
            <div class="music-upload-container">
                <label for="music-input" class="btn btn-secondary">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                    </svg>
                    Escolher Música MP3
                </label>
                <input type="file" id="music-input" accept="audio/*" class="hidden-input">
                <span id="selected-music-name" class="music-name-label">Stephen Sanchez - Until I Found You.mp3</span>
            </div>

            <div class="music-toggle-container">
                <label class="toggle-checkbox-label">
                    <input type="checkbox" id="music-enable-checkbox" checked>
                    <span class="custom-checkbox"></span>
                    Tocar música de fundo
                </label>
            </div>

            <button id="start-btn" class="btn btn-primary btn-large">Iniciar Apresentação</button>
        </div>
    </div>

    <!-- Container Principal do Slideshow -->
    <main id="slideshow-container" class="slideshow-container">
        <!-- Slides de Imagem (Serão inseridos e controlados via JS) -->
        <div id="slide-wrapper" class="slide-wrapper"></div>

        <!-- Efeito de Vinheta/Gradiente nas bordas para destacar as fotos -->
        <div class="vignette"></div>

        <!-- Overlay Elegante com Nomes (Canto superior esquerdo) -->
        <header id="wedding-header" class="wedding-header">
            <h2>Lucas & Brunna</h2>
            <p id="slide-info-text">Carregando momentos...</p>
        </header>

        <!-- Barra de Progresso de Transição (Topo) -->
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <!-- Elemento de Áudio Oculto -->
        <audio id="bg-music" loop></audio>

        <!-- Painel Flutuante de Controles (Esconde automaticamente com inatividade) -->
        <div id="control-panel" class="control-panel">
            
            <!-- Linha 1: Controles de Reprodução e Navegação -->
            <div class="control-row main-controls">
                <button id="prev-btn" class="ctrl-btn" title="Foto Anterior">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                </button>
                
                <button id="play-pause-btn" class="ctrl-btn play-btn" title="Play/Pause">
                    <!-- Ícone de Pause por padrão, muda para Play via JS -->
                    <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor" class="hidden"><path d="M8 5v14l11-7z"/></svg>
                </button>

                <button id="next-btn" class="ctrl-btn" title="Próxima Foto">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                </button>
            </div>

            <!-- Linha 2: Filtros e Configurações Rápidas -->
            <div class="control-row secondary-controls">
                <!-- Filtros de Pasta -->
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">Tudo</button>
                    <button class="filter-btn" data-filter="ensaio">Ensaio</button>
                    <button class="filter-btn" data-filter="brunna">Momentos</button>
                </div>

                <!-- Divisor Vertical -->
                <span class="v-divider"></span>

                <!-- Tipo de Transição -->
                <div class="setting-item">
                    <label for="transition-select">Transição:</label>
                    <select id="transition-select" class="styled-select">
                        <option value="kenburns">Ken Burns (Cinema)</option>
                        <option value="fade">Crossfade (Suave)</option>
                        <option value="slide">Deslizar</option>
                    </select>
                </div>

                <!-- Velocidade/Intervalo -->
                <div class="setting-item">
                    <label for="speed-range">Tempo: <span id="speed-label">8s</span></label>
                    <input type="range" id="speed-range" min="3" max="15" value="8" step="1" class="styled-slider">
                </div>

                <!-- Embaralhar / Shuffle -->
                <button id="shuffle-btn" class="toggle-btn" title="Embaralhar Ordem">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                        <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
                    </svg>
                    <span>Ordem Aleatória</span>
                </button>

                <!-- Controle de Áudio -->
                <button id="audio-toggle-btn" class="toggle-btn active" title="Mudar Áudio">
                    <svg id="audio-on-icon" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    <svg id="audio-off-icon" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" class="hidden">
                        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                    </svg>
                    <span>Música</span>
                </button>

                <!-- Botão de Tela Cheia -->
                <button id="fullscreen-btn" class="ctrl-btn-small" title="Tela Cheia (F)">
                    <svg id="fullscreen-enter" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    <svg id="fullscreen-exit" viewBox="0 0 24 24" fill="currentColor" class="hidden"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
                </button>
            </div>
        </div>

        <!-- Indicador de Status / Carregando Música -->
        <div id="toast-notification" class="toast-notification"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
